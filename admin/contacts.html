<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Contact Messages | JCS Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-title">Contact Messages</div>
    <div class="topbar-right">
      <div class="search-bar"><i class="fas fa-search"></i><input type="text" id="search" placeholder="Search messages..." oninput="renderContacts()"></div>
      <button class="export-btn" onclick="exportCSV()" style="background:var(--ink3);border:1px solid var(--line2);color:var(--txt2);font-family:var(--mono);font-size:11px;padding:7px 14px;border-radius:5px;cursor:pointer;display:flex;align-items:center;gap:6px"><i class="fas fa-download"></i> Export</button>
      <a href="../index.html" target="_blank" class="topbar-btn" style="margin-left:8px"><i class="fas fa-globe"></i> View Site</a>
    </div>
  </div>
  <div class="content">
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <button class="bfil active" onclick="filterStatus('all',this)" style="font-family:var(--mono);font-size:10px;padding:5px 12px;border:1px solid var(--line);border-radius:100px;background:var(--blue);border-color:var(--blue);color:#000;font-weight:700;cursor:pointer">All</button>
      <button class="bfil" onclick="filterStatus('new',this)" style="font-family:var(--mono);font-size:10px;padding:5px 12px;border:1px solid var(--line);border-radius:100px;background:transparent;color:var(--txt3);cursor:pointer">🔴 New</button>
      <button class="bfil" onclick="filterStatus('read',this)" style="font-family:var(--mono);font-size:10px;padding:5px 12px;border:1px solid var(--line);border-radius:100px;background:transparent;color:var(--txt3);cursor:pointer">🔵 Read</button>
      <button class="bfil" onclick="filterStatus('replied',this)" style="font-family:var(--mono);font-size:10px;padding:5px 12px;border:1px solid var(--line);border-radius:100px;background:transparent;color:var(--txt3);cursor:pointer">✅ Replied</button>
    </div>
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">Inbox <span id="contact-count" style="font-family:var(--mono);font-size:11px;color:var(--txt3);font-weight:400;margin-left:8px"></span></div>
      </div>
      <div class="panel-body table-wrap">
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Subject</th><th>Message</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
          <tbody id="contacts-table"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Message modal -->
<div class="modal-bg" id="msg-modal" onclick="if(event.target===this)closeMsgModal()">
  <div class="modal-box">
    <div class="modal-stripe"></div>
    <div class="modal-head">
      <h3 id="msg-modal-title">Message Details</h3>
      <button class="modal-close" onclick="closeMsgModal()">×</button>
    </div>
    <div class="modal-body" id="msg-modal-body"></div>
  </div>
</div>

<script src="admin.js"></script>
<script>
requireAuth();
document.getElementById('sidebar').innerHTML = renderSidebar('contacts');
loadBadges();

let allContacts = [], currentFilter = 'all';

async function loadContacts() {
  allContacts = getLocalData('contacts', DEMO_DATA.contacts) || DEMO_DATA.contacts;
  try {
    const r = await api('GET', '/contacts');
    if (r?.ok && r.data.contacts?.length) {
      allContacts = r.data.contacts;
      setLocalData('contacts', allContacts);
    }
  } catch(e) {}
  renderContacts();
}

function filterStatus(s, btn) {
  currentFilter = s;
  document.querySelectorAll('.bfil').forEach(b => { b.style.background='transparent'; b.style.color='var(--txt3)'; b.style.borderColor='var(--line)'; b.style.fontWeight='400'; });
  btn.style.background = 'var(--blue)'; btn.style.color = '#fff'; btn.style.borderColor = 'var(--blue)'; btn.style.fontWeight = '700';
  renderContacts();
}

function renderContacts() {
  const search = document.getElementById('search').value.toLowerCase();
  const filtered = allContacts.filter(c => {
    const matchS = currentFilter === 'all' || c.status === currentFilter;
    const matchQ = !search || c.name.toLowerCase().includes(search) || c.email.toLowerCase().includes(search) || (c.subject||'').toLowerCase().includes(search) || c.message.toLowerCase().includes(search);
    return matchS && matchQ;
  });
  document.getElementById('contact-count').textContent = `(${filtered.length})`;
  document.getElementById('contacts-table').innerHTML = filtered.length ? filtered.map(c => `
    <tr style="${c.status==='new'?'background:rgba(29,114,245,.025)':''}">
      <td><div class="td-name" style="${c.status==='new'?'color:var(--blue)':''}">${c.name}${c.status==='new'?' 🔴':''}</div></td>
      <td style="font-size:12px"><a href="mailto:${c.email}" style="color:var(--blue)">${c.email}</a></td>
      <td style="font-size:12px;max-width:150px">${truncate(c.subject||'—',30)}</td>
      <td style="font-size:12px;color:var(--txt3);max-width:200px">${truncate(c.message,50)}</td>
      <td>
        <select onchange="updateContactStatus('${c._id}',this.value)" class="fi" style="padding:4px 8px;font-size:11px;width:auto">
          ${['new','read','replied'].map(s=>`<option value="${s}" ${c.status===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
        </select>
      </td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--txt3)">${fmtTime(c.createdAt)}</td>
      <td style="white-space:nowrap">
        <button class="act-btn" onclick="viewContact('${c._id}')"><i class="fas fa-eye"></i> Read</button>
        <a href="mailto:${c.email}?subject=Re: ${encodeURIComponent(c.subject||'Your inquiry')}" class="act-btn success" style="margin-left:4px"><i class="fas fa-reply"></i></a>
        <button class="act-btn danger" onclick="deleteContact('${c._id}')" style="margin-left:4px"><i class="fas fa-trash"></i></button>
      </td>
    </tr>`).join('') :
    `<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--txt3);font-family:var(--mono);font-size:12px">No messages found.</td></tr>`;
}

async function updateContactStatus(id, status) {
  await api('PUT', '/contacts/' + id, { status });
  const c = allContacts.find(x => x._id === id);
  if (c) c.status = status;
  setLocalData('contacts', allContacts);
  const newCount = allContacts.filter(c => c.status === 'new').length;
  const badge = document.getElementById('badge-contacts');
  if (badge) { badge.textContent = newCount; badge.style.display = newCount > 0 ? 'block' : 'none'; }
  renderContacts();
}

function viewContact(id) {
  const c = allContacts.find(x => x._id === id);
  if (!c) return;
  if (c.status === 'new') updateContactStatus(id, 'read');
  document.getElementById('msg-modal-title').textContent = 'Message from ' + c.name;
  document.getElementById('msg-modal-body').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px">
      <div><div style="font-family:var(--mono);font-size:9px;color:var(--txt3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:5px">From</div><div style="font-size:14px;font-weight:700">${c.name}</div></div>
      <div><div style="font-family:var(--mono);font-size:9px;color:var(--txt3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:5px">Email</div><div style="font-size:14px"><a href="mailto:${c.email}" style="color:var(--blue)">${c.email}</a></div></div>
      ${c.phone?`<div><div style="font-family:var(--mono);font-size:9px;color:var(--txt3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:5px">Phone</div><div style="font-size:14px"><a href="tel:${c.phone}" style="color:var(--blue)">${c.phone}</a></div></div>`:''}
      ${c.company?`<div><div style="font-family:var(--mono);font-size:9px;color:var(--txt3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:5px">Company</div><div style="font-size:14px">${c.company}</div></div>`:''}
      <div><div style="font-family:var(--mono);font-size:9px;color:var(--txt3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:5px">Subject</div><div style="font-size:14px">${c.subject||'General Inquiry'}</div></div>
      <div><div style="font-family:var(--mono);font-size:9px;color:var(--txt3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:5px">Received</div><div style="font-size:14px">${fmtTime(c.createdAt)}</div></div>
    </div>
    <div style="margin-bottom:18px">
      <div style="font-family:var(--mono);font-size:9px;color:var(--txt3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px">Message</div>
      <div style="background:var(--ink2);border:1px solid var(--line);border-radius:6px;padding:16px;font-size:14px;color:var(--txt2);line-height:1.7">${c.message}</div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <a href="mailto:${c.email}?subject=Re: ${encodeURIComponent(c.subject||'Your inquiry to Jain Cyber Solutions')}" class="save-btn" style="text-decoration:none"><i class="fas fa-reply"></i> Reply via Email</a>
      ${c.phone?`<a href="tel:${c.phone}" class="save-btn" style="background:var(--teal);text-decoration:none"><i class="fas fa-phone"></i> Call</a>`:''}
      <button class="cancel-btn" onclick="closeMsgModal()">Close</button>
    </div>`;
  document.getElementById('msg-modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeMsgModal() {
  document.getElementById('msg-modal').classList.remove('open');
  document.body.style.overflow='';
}

async function deleteContact(id) {
  if (!window.confirm('Delete this message?')) return;
  await api('DELETE', '/contacts/' + id);
  allContacts = allContacts.filter(c => c._id !== id);
  renderContacts(); toast('Message deleted','success');
  setLocalData('contacts', allContacts);
}

function exportCSV() {
  const headers = ['Name','Email','Phone','Subject','Message','Status','Date'];
  const rows = allContacts.map(c => [c.name,c.email,c.phone||'',c.subject||'',c.message,c.status,fmtDate(c.createdAt)]);
  const csv = [headers,...rows].map(r=>r.map(x=>`"${(x||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'jcs-contacts-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click(); toast('Contacts exported','success');
}

loadContacts();
</script>
</body>
</html>
