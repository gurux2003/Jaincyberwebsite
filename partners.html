<script>
function openPartnerForm(type) {
  document.getElementById('partner-type-select').value = type.includes('Gold') ? 'Gold Partner — Technology Vendor / System Integrator' : type.includes('Silver') ? 'Silver Partner — Channel Reseller / Consultant' : 'Technology Partner — Software / Hardware Integration';
  document.getElementById('become-partner').scrollIntoView({behavior:'smooth'});
}
async function submitPartner(form) {
  const btn = form.querySelector('[type=submit]');
  const data = Object.fromEntries(new FormData(form));
  if (!data.name || !data.email || !data.company) { toast('Please fill all required fields','error'); return; }
